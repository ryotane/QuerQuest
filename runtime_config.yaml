# QueryQuest Runtime Configuration
# Project_09: Runtime Hardening - Safe Defaults

# ========================================
# Runtime Profile
# ========================================
# lightweight: Mac-friendly minimal mode (default)
# balanced: Standard operation
# full: Maximum features (not recommended for daily use)
runtime_profile: lightweight

# ========================================
# Safety Guard Defaults (P0: safe defaults)
# ========================================
safety_guard:
  max_reasoning_steps: 5          # 10 → 5 (厳格化)
  max_hypothesis_repeats: 2       # 3 → 2 (厳格化)
  max_same_file_reads: 2          # 3 → 2 (厳格化)
  observation_cooldown_ms: 500
  debug: false

# ========================================
# Collapse Prevention (Project_08)
# ========================================
collapse_prevention:
  planning_ttl_seconds: 5.0
  planning_ttl_steps: 10
  max_plan_length: 3
  anti_meta_threshold: 2
  debug: false

# ========================================
# Memory Management (P1: resource caps)
# ========================================
memory:
  max_items: 500                  # 1000 → 500 (削減)
  max_active_memory_bytes: 5_000_000      # 5MB
  max_archive_memory_bytes: 20_000_000    # 20MB
  max_total_memory_bytes: 30_000_000      # 30MB
  compression_trigger_ratio: 0.7    # 70% で圧縮開始
  swap_prevention: true
  swap_threshold_mb: 100            # 100MB で警告

# ========================================
# Token Budget (P2: token growth control)
# ========================================
token_budget:
  max_context_tokens: 50_000        # 50k tokens
  growth_alert_threshold: 10.0      # 10% で警告
  explosion_threshold: 50.0         # 50% で緊急停止
  compression_priority: high        # high/medium/low

# ========================================
# Loop Risk (P1: loop prevention)
# ========================================
loop_risk:
  high_threshold: 0.5
  critical_threshold: 0.8
  max_injection_count: 5
  max_recursion_depth: 3
  max_amplification_count: 2

# ========================================
# Observability (P1: health monitoring)
# ========================================
observability:
  health_check_interval_seconds: 60
  export_json: true
  export_path: "logs/health_status.json"
  swiftbar: false
  alert_on_critical: true

# ========================================
# Graceful Degradation (P1: fail-safe)
# ========================================
degradation:
  on_memory_pressure: compress_archive      # compress_archive / disable_vector / shutdown
  on_loop_risk_critical: force_observation  # force_observation / disable_planning / shutdown
  on_token_explosion: compress_context       # compress_context / truncate / shutdown
  on_config_error: use_defaults             # use_defaults / shutdown

# ========================================
# Lightweight Mode Overrides (P1: Mac-friendly)
# ========================================
lightweight_overrides:
  embedding_enabled: false
  vector_search_enabled: false
  compression_enabled: true
  telemetry_enabled: false
  background_tasks: false
  max_reflection_depth: 1

# ========================================
# Stability (P0: config validation)
# ========================================
validation:
  require_safe_defaults: true
  reject_negative_values: true
  reject_extreme_values: true
  extreme_value_limits:
    max_reasoning_steps: 20
    min_reasoning_steps: 1
    max_plan_length: 10
    min_plan_length: 1
    max_memory_bytes: 100_000_000
    min_memory_bytes: 1_000_000

# ========================================
# Ambient Runtime (Project_16)
# ========================================
ambient_runtime:
  # Presence Layer Settings
  presence_layer:
    idle_notification_level: none          # none / low / high
    passive_notification_level: none       # none / low / high
    active_assistance_notification_level: low
    critical_issue_notification_level: high
    recovery_notification_level: none
    layer_transition_fade_ms: 300           # フェードイン/アウト時間

  # iPhone Companion Settings
  iphone_companion:
    notification_cooldown_seconds: 3600     # 1時間（緊急時以外）
    max_daily_notifications: 5              # 1日あたりの通知上限
    batched_delivery_enabled: true          # バッチ配信有効
    realtime_sync_enabled: false            # リアルタイム同期無効
    connection_grace_period_seconds: 30     # 切断許容時間

  # Dashboard Settings
  dashboard:
    low_density_mode: true                  # 低密度情報表示
    minimal_graphs: true                    # グラフ最小限
    calm_observability: true                # 静かな可観測性
    reassurance_first: true                 # 安心感優先
    max_visible_metrics: 3                  # 最大表示メトリクス数
    detail_access_on_demand: true           # 詳細は必要時のみ

  # Memory Environment Settings
  memory_environment:
    background_infrastructure: true         # バックグラウンドインフラ
    surfaced_only_when_needed: true         # 必要時のみ表示
    quiet_archive: true                     # 静かなアーカイブ
    no_forced_recall: true                  # 強制想起禁止
    no_memory_flooding: true                # メモリ洪水禁止
    max_concurrent_surfaces: 2              # 同時表示最大数

  # Attention Protection Settings
  attention_protection:
    focus_mode_detection: true              # 集中状態検出
    repeated_interruption_suppression: true # 繰り返し中断抑制
    passive_waiting_behavior: true          # 受動的待機動作
    notification_cooldown_seconds: 1800     # 通知冷却時間（30分）
    silent_recovery_enabled: true           # サイレントリカバリ有効
    max_proposals_per_issue: 1              # 問題あたりの提案数上限
    proposal_cooldown_minutes: 60           # 提案冷却時間

  # Ambient Continuity Settings
  ambient_continuity:
    invisible_hydration: true               # 目に見えない状態復元
    no_forced_continuation: true            # 強制継続禁止
    calm_restoration: true                  # 静かな回復処理
    natural_resume_enabled: true            # 自然な再開有効
    interruption_acceptance: true           # 中断の許容

# ========================================
# Runtime State Clarity (Project_027)
# ========================================
runtime_state:
  # Minimal state taxonomy (5 states only)
  states:
    - RUNNING      # 実行中
    - WAITING      # 待機中（外部入力待ち）
    - COMPLETE     # 正常完了
    - INTERRUPTED  # ユーザー中断
    - TIMEOUT      # タイムアウト

  # Timeout boundaries (quiet interruption, not failure)
  timeout:
    thinking_ms: 30000      # 思考タイムアウト（30秒）
    action_ms: 60000        # アクションタイムアウト（1分）
    waiting_ms: 120000      # 待機タイムアウト（2分）

  # Quiet completion format (on-demand, single-line)
  completion:
    on_demand_only: true          # ユーザー確認時のみ表示
    single_line_format: true      # 1行フォーマットのみ許可
    no_auto_refresh: true         # 自動更新禁止
    ephemeral_output: true        # 出力後直ちに消去

  # Interruption recovery clarity
  interruption:
    continuation_possible: true   # 再開可能であることを明示
    next_step_display: true       # 次のステップを提示
    no_auto_retry: true           # 自動リトライ禁止
    state_preservation: true      # 中断前状態の維持
